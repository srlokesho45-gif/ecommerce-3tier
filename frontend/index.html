<!DOCTYPE html>
<html>
<body>
  <h1>DevOps App 🚀</h1>
  <button onclick="getData()">Get Data</button>
  <p id="result"></p>

  <script>
    async function getData() {
      let res = await fetch('http://localhost:3000');
      let data = await res.text();
      document.getElementById("result").innerText = data;
    }
  </script>
</body>
</html>
