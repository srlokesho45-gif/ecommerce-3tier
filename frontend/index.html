<!DOCTYPE html>
<html>
<body>

<h2>Signup</h2>
<input id="su_user" placeholder="Username">
<input id="su_pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="li_user" placeholder="Username">
<input id="li_pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="result"></p>

<script>
const API = "http://backend:3000";

async function signup() {
  let username = document.getElementById("su_user").value;
  let password = document.getElementById("su_pass").value;

  let res = await fetch(API + "/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  document.getElementById("result").innerText = await res.text();
}

async function login() {
  let username = document.getElementById("li_user").value;
  let password = document.getElementById("li_pass").value;

  let res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  let data = await res.json();
  document.getElementById("result").innerText = data.message;

  if (data.token) {
    localStorage.setItem("token", data.token);
  window.location.href="dashboard.html";
}
}
</script>

</body>
</html>
